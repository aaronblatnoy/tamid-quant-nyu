name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.11.7"
  PYTHON_VERSION: "3.12"

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: ruff format check
        run: uv run ruff format --check .
      - name: ruff lint
        run: uv run ruff check .
      - name: basedpyright
        run: uv run basedpyright

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taq
          POSTGRES_PASSWORD: taq
          POSTGRES_DB: taquantgeo_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U taq -d taquantgeo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: Apply migrations
        env:
          DATABASE_URL: postgresql+psycopg://taq:taq@localhost:5432/taquantgeo_test
        run: uv run alembic upgrade head
      - name: pytest
        env:
          DATABASE_URL: postgresql+psycopg://taq:taq@localhost:5432/taquantgeo_test
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest --cov --cov-report=xml -m "not live"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.xml
          retention-days: 7
