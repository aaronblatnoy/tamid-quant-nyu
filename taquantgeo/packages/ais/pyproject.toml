[project]
name = "taquantgeo-ais"
version = "0.0.1"
description = "AIS ingestion, parsing, and voyage state machine"
requires-python = ">=3.12"
dependencies = [
    "taquantgeo-core",
    "websockets>=14.0",
    "pydantic>=2.10",
    "polars>=1.20",
    "pyarrow>=18.0",
    "httpx>=0.27",
    "searoute>=1.5,<2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/taquantgeo_ais"]
