[project]
name = "taquantgeo-cli"
version = "0.0.1"
description = "taq command-line tool"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.13",
    "rich>=13.0",
    "taquantgeo-core",
    "taquantgeo-ais",
    "taquantgeo-signals",
    "taquantgeo-jobs",
    "taquantgeo-prices",
]

[project.scripts]
taq = "taquantgeo_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/taquantgeo_cli"]
