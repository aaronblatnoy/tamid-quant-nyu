[project]
name = "taquantgeo-jobs"
version = "0.0.1"
description = "Scheduled pipelines (APScheduler)"
requires-python = ">=3.12"
dependencies = [
    "taquantgeo-core",
    "taquantgeo-signals",
    "polars>=1.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/taquantgeo_jobs"]
