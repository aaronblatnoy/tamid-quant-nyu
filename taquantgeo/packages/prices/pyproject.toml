[project]
name = "taquantgeo-prices"
version = "0.0.1"
description = "Equity price ingestion for the shipping-equity proxy basket"
requires-python = ">=3.12"
dependencies = [
    "taquantgeo-core",
    "polars>=1.20",
    "pyarrow>=18.0",
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
    "yfinance>=0.2.50",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/taquantgeo_prices"]
