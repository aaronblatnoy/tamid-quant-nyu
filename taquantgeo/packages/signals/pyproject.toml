[project]
name = "taquantgeo-signals"
version = "0.0.1"
description = "Tightness signal computation and signal-vs-price comparison"
requires-python = ">=3.12"
dependencies = [
    "taquantgeo-core",
    "taquantgeo-ais",
    "polars>=1.20",
    "pyarrow>=18.0",
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
    "scipy>=1.13",
    "pandas>=2.2",
    "tabulate>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/taquantgeo_signals"]
